<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temple Run 777</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --gold: #ffd76a;
      --deep-gold: #c88c20;
      --red: #e31937;
      --white: #fff8ec;
      --ink: #2f2530;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #15101a;
      font-family: Georgia, "Times New Roman", serif;
      touch-action: manipulation;
      user-select: none;
    }

    .game-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 18%, rgba(255, 215, 106, 0.24), transparent 28%),
        linear-gradient(180deg, #1e2037 0%, #342739 45%, #5d3d35 100%);
    }

    canvas {
      width: min(100vw, 1200px);
      height: min(100vh, 720px);
      max-width: 100vw;
      max-height: 100vh;
      display: block;
      background: #8bc7f4;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
      touch-action: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--white);
      text-align: center;
      background: linear-gradient(180deg, rgba(26, 16, 28, 0.74), rgba(46, 29, 30, 0.62));
    }

    .panel {
      width: min(92vw, 560px);
      padding: 32px 28px;
      border: 2px solid rgba(255, 215, 106, 0.68);
      border-radius: 8px;
      background: rgba(39, 27, 31, 0.78);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(8px);
    }

    .lucky {
      margin: 0 0 6px;
      color: var(--red);
      font-size: clamp(86px, 20vw, 164px);
      line-height: 0.82;
      text-shadow:
        0 0 14px rgba(255, 37, 62, 0.85),
        0 8px 0 rgba(93, 16, 22, 0.55),
        0 0 46px rgba(255, 215, 106, 0.24);
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 72px);
      line-height: 1;
      color: var(--white);
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.28);
      letter-spacing: 0;
    }

    .tagline {
      margin: 16px 0 26px;
      color: var(--gold);
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 700;
      letter-spacing: 0;
    }

    .hint {
      margin: 14px 0 0;
      color: rgba(255, 248, 236, 0.82);
      font-size: 16px;
      font-family: Arial, sans-serif;
    }

    button {
      min-width: 170px;
      border: 0;
      border-radius: 8px;
      padding: 15px 24px;
      color: #341300;
      background: linear-gradient(180deg, #ffe893, #d59728);
      box-shadow: 0 5px 0 #8b5613, 0 12px 30px rgba(0, 0, 0, 0.3);
      font: 800 18px Arial, sans-serif;
      cursor: pointer;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #8b5613, 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    .mute-button {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 5;
      width: 42px;
      height: 42px;
      min-width: 42px;
      padding: 0;
      border: 1px solid rgba(255, 248, 236, 0.46);
      color: #fff8ec;
      background: rgba(42, 25, 28, 0.72);
      box-shadow: 0 3px 0 rgba(116, 76, 16, 0.72), 0 10px 24px rgba(0, 0, 0, 0.22);
      font-size: 18px;
      line-height: 42px;
      backdrop-filter: blur(6px);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 560px) {
      .panel {
        padding: 26px 18px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="Temple Run 777 game">
    <canvas id="game" width="1200" height="720"></canvas>
  </main>
  <audio id="bgMusic" src="https://raw.githubusercontent.com/heiscaleb/temple777-assets/main/bombinsound-hip-hop-background-514147.mp3" loop preload="auto"></audio>
  <button id="muteButton" class="mute-button" type="button" aria-label="Turn music off">🔊</button>

  <section id="startScreen" class="overlay">
    <div class="panel">
      <p class="lucky">777</p>
      <h1>Temple Run 777</h1>
      <p class="tagline">Wealth. Health. Psychology.</p>
      <button id="startButton" type="button">Start</button>
      <p class="hint">Space/tap to jump twice. Down arrow or swipe down to slide.</p>
    </div>
  </section>

  <section id="gameOverScreen" class="overlay hidden">
    <div class="panel">
      <p class="lucky">777</p>
      <h1>Game Over</h1>
      <p id="finalScore" class="tagline">Coins: 0</p>
      <button id="restartButton" type="button">Restart</button>
    </div>
  </section>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const startScreen = document.getElementById("startScreen");
      const gameOverScreen = document.getElementById("gameOverScreen");
      const finalScore = document.getElementById("finalScore");
      const startButton = document.getElementById("startButton");
      const restartButton = document.getElementById("restartButton");
      const muteButton = document.getElementById("muteButton");
      const bgMusic = document.getElementById("bgMusic");

      const W = canvas.width;
      const H = canvas.height;
      const groundY = 590;
      const gravity = 3560;
      const jumpVelocity = -1400;
      const statue = {
        x: 172,
        y: groundY,
        w: 86,
        h: 178,
        vy: 0,
        grounded: true,
        stride: 0,
        jumps: 0,
        sliding: false,
        slideTimer: 0
      };

      let state = "start";
      let lastTime = 0;
      let gameTime = 0;
      let coinCount = 0;
      let bestCoins = Number(localStorage.getItem("templeRun777BestCoins") || 0);
      let worldSpeed = 560;
      let distance = 0;
      let obstacleTimer = 0;
      let hazardTimer = 0;
      let coinTimer = 0;
      let lastDangerSpawnTime = -999;
      let nextDangerType = "ground";
      let sevenTimer = 0;
      let bonusTimer = 0;
      let sevenCooldownTimer = 0;
      let goldFlash = 0;
      let shakeTimer = 0;
      let shakePower = 0;
      let streak = 0;
      let obstacles = [];
      let hazards = [];
      let coins = [];
      let sevens = [];
      let dust = [];
      let audioCtx = null;
      let musicGain = null;
      let musicMuted = false;
      let musicPlaying = false;
      let musicNextTime = 0;
      let musicStep = 0;
      const playerSprites = {
        walk1: loadSprite("https://raw.githubusercontent.com/heiscaleb/temple777-assets/main/player_walk1.png"),
        walk2: loadSprite("https://raw.githubusercontent.com/heiscaleb/temple777-assets/main/player_walk2.png"),
        jump: loadSprite("https://raw.githubusercontent.com/heiscaleb/temple777-assets/main/player_jump.png"),
        slide: loadSprite("https://raw.githubusercontent.com/heiscaleb/temple777-assets/main/player_slide.png"),
        duck: loadSprite("https://raw.githubusercontent.com/heiscaleb/temple777-assets/main/player_duck.png")
      };

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

      function loadSprite(src) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = src;
        return img;
      }

      function resetGame() {
        coinCount = 0;
        gameTime = 0;
        worldSpeed = 560;
        distance = 0;
        obstacleTimer = 5;
        hazardTimer = 5;
        coinTimer = 2.2;
        lastDangerSpawnTime = -999;
        nextDangerType = "ground";
        sevenTimer = 6.5;
        bonusTimer = 0;
        sevenCooldownTimer = 0;
        goldFlash = 0;
        shakeTimer = 0;
        shakePower = 0;
        streak = 0;
        obstacles = [];
        hazards = [];
        coins = [];
        sevens = [];
        dust = [];
        statue.y = groundY;
        statue.vy = 0;
        statue.grounded = true;
        statue.stride = 0;
        statue.jumps = 0;
        statue.sliding = false;
        statue.slideTimer = 0;
        lastTime = performance.now();
      }

      function startGame() {
        ensureAudio();
        resetGame();
        startMusic();
        state = "playing";
        startScreen.classList.add("hidden");
        gameOverScreen.classList.add("hidden");
        requestAnimationFrame(loop);
      }

      function endGame() {
        state = "over";
        stopMusic();
        if (coinCount > bestCoins) {
          bestCoins = coinCount;
          localStorage.setItem("templeRun777BestCoins", String(bestCoins));
        }
        playCrashSound();
        setTimeout(playGameOverSound, 130);
        finalScore.textContent = `Coins: ${coinCount.toLocaleString()}  Best: ${bestCoins.toLocaleString()}`;
        gameOverScreen.classList.remove("hidden");
      }

      function jump() {
        if (state === "start") {
          startGame();
          return;
        }
        if (state === "over") {
          startGame();
          return;
        }
        if (statue.jumps < 2 && !statue.sliding) {
          statue.vy = jumpVelocity;
          statue.grounded = false;
          statue.jumps += 1;
          playJumpSound();
          for (let i = 0; i < 10; i++) {
            dust.push({
              x: statue.x + 28 + Math.random() * 35,
              y: groundY - 6 + Math.random() * 8,
              r: 2 + Math.random() * 5,
              life: 0.45 + Math.random() * 0.25,
              vx: -120 - Math.random() * 100
            });
          }
        }
      }

      function slide() {
        if (state !== "playing" || !statue.grounded) return;
        statue.sliding = true;
        statue.slideTimer = 0.72;
        for (let i = 0; i < 12; i++) {
          dust.push({
            x: statue.x + 30 + Math.random() * 78,
            y: groundY - 4 + Math.random() * 10,
            r: 2 + Math.random() * 5,
            life: 0.38 + Math.random() * 0.22,
            vx: -180 - Math.random() * 170
          });
        }
      }

      function spawnObstacle() {
        const isTorch = Math.random() < 0.55;
        const width = isTorch ? 118 : 86 + Math.random() * 16;
        const height = isTorch ? 108 : width;
        obstacles.push({
          x: W + 40,
          y: groundY - height,
          w: width,
          h: height,
          type: isTorch ? "torch" : "boulder",
          rotation: (Math.random() - 0.5) * 0.18,
          passed: false
        });
        lastDangerSpawnTime = gameTime;
      }

      function spawnHazard() {
        const isMedusa = Math.random() < 0.58;
        hazards.push({
          x: W + 70,
          y: isMedusa ? groundY - 150 - Math.random() * 26 : groundY - 228 - Math.random() * 34,
          w: isMedusa ? 86 : 156,
          h: isMedusa ? 76 : 124,
          type: isMedusa ? "medusa" : "lightning",
          angle: Math.random() < 0.5 ? -1 : 1,
          spin: Math.random() * Math.PI * 2,
          passed: false
        });
        lastDangerSpawnTime = gameTime;
      }

      function getDifficultyLevel() {
        return Math.floor(Math.max(0, gameTime - 5) / 20);
      }

      function getDangerGap() {
        return Math.max(2, 3.15 - getDifficultyLevel() * 0.38);
      }

      function scheduleNextDanger() {
        const gap = getDangerGap();
        obstacleTimer = gap;
        hazardTimer = gap;
      }

      function updateDifficulty() {
        worldSpeed = Math.min(1120, 560 + getDifficultyLevel() * 130);
      }

      function chooseNextDangerType() {
        const hazardChance = clamp(0.42 + getDifficultyLevel() * 0.12, 0.42, 0.82);
        return Math.random() < hazardChance ? "hazard" : "ground";
      }

      function trySpawnDanger() {
        if (gameTime < 5) return;
        if (!statue.grounded) return;
        if (gameTime - lastDangerSpawnTime < 2) return;
        if (obstacleTimer > 0 || hazardTimer > 0) return;

        if (nextDangerType === "ground") {
          spawnObstacle();
          nextDangerType = chooseNextDangerType();
          scheduleNextDanger();
        } else if (nextDangerType === "hazard") {
          spawnHazard();
          nextDangerType = chooseNextDangerType();
          scheduleNextDanger();
        }
      }

      function spawnSeven() {
        const heights = [groundY - 98, groundY - 178, groundY - 265];
        sevens.push({
          x: W + 30,
          y: heights[Math.floor(Math.random() * heights.length)],
          size: 52 + Math.random() * 12,
          bob: Math.random() * Math.PI * 2,
          collected: false
        });
        sevenTimer = 5 + Math.random() * 5;
      }

      function spawnCoins() {
        const count = 3 + Math.floor(Math.random() * 4);
        const startX = W + 110 + Math.random() * 120;
        for (let i = 0; i < count; i++) {
          coins.push({
            x: startX + i * (38 + Math.random() * 16),
            y: groundY - 38 - Math.random() * 18,
            r: 21.6,
            spin: Math.random() * Math.PI * 2,
            collected: false
          });
        }
        coinTimer = 3.2 + Math.random() * 2.2;
      }

      function ensureAudio() {
        if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) {
            audioCtx = new AudioContext();
            musicGain = audioCtx.createGain();
            musicGain.gain.value = 0;
            musicGain.connect(audioCtx.destination);
          }
        }
        if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
      }

      function startMusic() {
        musicPlaying = true;
        bgMusic.currentTime = 0;
        bgMusic.muted = musicMuted;
        bgMusic.playbackRate = 1;
        bgMusic.play().catch(() => {});
      }

      function stopMusic() {
        musicPlaying = false;
        bgMusic.pause();
        bgMusic.currentTime = 0;
      }

      function setMusicMuted(muted) {
        musicMuted = muted;
        muteButton.textContent = musicMuted ? "🔇" : "🔊";
        muteButton.setAttribute("aria-label", musicMuted ? "Turn music on" : "Turn music off");
        bgMusic.muted = musicMuted;
        if (musicGain && audioCtx) {
          musicGain.gain.cancelScheduledValues(audioCtx.currentTime);
          musicGain.gain.setTargetAtTime(musicMuted || !musicPlaying ? 0 : 0.05, audioCtx.currentTime, 0.08);
          if (!musicMuted && musicPlaying) musicNextTime = audioCtx.currentTime + 0.08;
        }
      }

      function playTone(frequency, duration, type, volume, delay = 0, endFrequency = frequency) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime + delay;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, now);
        osc.frequency.exponentialRampToValueAtTime(Math.max(20, endFrequency), now + duration);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(volume, now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration + 0.03);
      }

      function playMusicTone(frequency, duration, type, volume, time) {
        if (!audioCtx || !musicGain) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, time);
        gain.gain.setValueAtTime(0.0001, time);
        gain.gain.exponentialRampToValueAtTime(volume, time + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
        osc.connect(gain);
        gain.connect(musicGain);
        osc.start(time);
        osc.stop(time + duration + 0.03);
      }

      function playMusicDrum(time, beat) {
        if (!audioCtx || !musicGain) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(92, time);
        osc.frequency.exponentialRampToValueAtTime(38, time + beat * 0.34);
        gain.gain.setValueAtTime(0.0001, time);
        gain.gain.exponentialRampToValueAtTime(0.13, time + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + beat * 0.48);
        osc.connect(gain);
        gain.connect(musicGain);
        osc.start(time);
        osc.stop(time + beat * 0.5);
      }

      function scheduleMusic() {
        if (musicPlaying) {
          const speedRatio = clamp((worldSpeed - 560) / 560, 0, 1);
          bgMusic.playbackRate = 1 + speedRatio * 0.12;
        }
        return;
        if (!audioCtx || !musicGain || musicMuted || !musicPlaying) return;
        const speedRatio = clamp((worldSpeed - 560) / 560, 0, 1);
        const beat = 0.38 - speedRatio * 0.11;
        const melody = [220, 261.63, 293.66, 329.63, 392, 329.63, 293.66, 261.63];
        const bass = [55, 55, 73.42, 73.42, 82.41, 82.41, 73.42, 55];
        while (musicNextTime < audioCtx.currentTime + 0.8) {
          const index = musicStep % melody.length;
          playMusicDrum(musicNextTime, beat);
          playMusicTone(bass[index], beat * 1.9, "sawtooth", 0.03, musicNextTime);
          playMusicTone(bass[index] * 0.5, beat * 2.6, "sine", 0.026, musicNextTime);
          playMusicTone(melody[index], beat * 0.88, "triangle", 0.03, musicNextTime + beat * 0.16);
          if (index === 2 || index === 6) playMusicTone(melody[index] * 2, beat * 0.72, "sine", 0.015, musicNextTime + beat * 0.42);
          musicStep += 1;
          musicNextTime += beat;
        }
      }

      function playJumpSound() {
        ensureAudio();
        playTone(260, 0.18, "sine", 0.09, 0, 720);
      }

      function playCrashSound() {
        ensureAudio();
        playTone(92, 0.28, "sawtooth", 0.16, 0, 34);
        playTone(54, 0.34, "square", 0.11, 0.02, 28);
      }

      function playSevenSound() {
        ensureAudio();
        playTone(660, 0.13, "sine", 0.1);
        playTone(990, 0.16, "sine", 0.08, 0.08);
        playTone(1320, 0.18, "triangle", 0.07, 0.16);
      }

      function playCoinSound() {
        ensureAudio();
        playTone(880, 0.1, "triangle", 0.08);
        playTone(1320, 0.13, "sine", 0.07, 0.06);
        playTone(1760, 0.16, "triangle", 0.055, 0.13);
      }

      function playPowerSound() {
        ensureAudio();
        playTone(196, 0.45, "triangle", 0.12, 0, 392);
        playTone(392, 0.42, "sine", 0.1, 0.12, 784);
        playTone(784, 0.6, "triangle", 0.09, 0.28, 1175);
      }

      function playGameOverSound() {
        ensureAudio();
        playTone(240, 0.42, "triangle", 0.12, 0, 90);
        playTone(130, 0.58, "sine", 0.1, 0.14, 48);
      }

      function update(dt) {
        const powerMode = bonusTimer > 0;
        gameTime += dt;
        updateDifficulty();
        scheduleMusic();
        distance += worldSpeed * dt;
        statue.stride += dt * (statue.grounded ? 9 : 4);
        if (statue.sliding) {
          statue.slideTimer -= dt;
          if (statue.slideTimer <= 0) statue.sliding = false;
        }

        statue.vy += gravity * dt;
        statue.y += statue.vy * dt;
        if (statue.y >= groundY) {
          statue.y = groundY;
          statue.vy = 0;
          statue.grounded = true;
          statue.jumps = 0;
        }

        obstacleTimer -= dt;
        hazardTimer -= dt;
        coinTimer -= dt;
        sevenTimer -= dt;
        trySpawnDanger();
        if (coinTimer <= 0 && gameTime > 5 && obstacleTimer > 0.8 && hazardTimer > 0.8) spawnCoins();
        if (sevenTimer <= 0) spawnSeven();

        obstacles.forEach((ob) => {
          ob.x -= worldSpeed * dt;
          if (!ob.passed && ob.x + ob.w < statue.x) {
            ob.passed = true;
          }
        });
        hazards.forEach((hazard) => {
          hazard.x -= (worldSpeed + 110) * dt;
          hazard.spin += dt * 8;
          if (!hazard.passed && hazard.x + hazard.w < statue.x) {
            hazard.passed = true;
          }
        });
        sevens.forEach((seven) => {
          seven.x -= worldSpeed * dt;
          seven.bob += dt * 4;
        });
        coins.forEach((coin) => {
          coin.x -= worldSpeed * dt;
          coin.spin += dt * 9;
        });
        dust.forEach((p) => {
          p.x += p.vx * dt;
          p.life -= dt;
          p.r *= 0.985;
        });

        obstacles = obstacles.filter((ob) => ob.x + ob.w > -80);
        hazards = hazards.filter((hazard) => hazard.x + hazard.w > -120);
        coins = coins.filter((coin) => coin.x + coin.r > -80 && !coin.collected);
        sevens = sevens.filter((seven) => seven.x + seven.size > -80 && !seven.collected);
        dust = dust.filter((p) => p.life > 0);

        if (bonusTimer > 0) {
          bonusTimer = Math.max(0, bonusTimer - dt);
          if (bonusTimer === 0) {
            sevenCooldownTimer = 5;
            streak = 0;
          }
        } else if (sevenCooldownTimer > 0) {
          sevenCooldownTimer = Math.max(0, sevenCooldownTimer - dt);
        }
        if (goldFlash > 0) goldFlash -= dt;
        if (shakeTimer > 0) shakeTimer -= dt;

        const statueBox = getStatueBox();

        for (const coin of coins) {
          if (circleRectOverlap(coin.x, coin.y, coin.r + 4, statueBox)) {
            coin.collected = true;
            coinCount += 1;
            if (coinCount > bestCoins) {
              bestCoins = coinCount;
              localStorage.setItem("templeRun777BestCoins", String(bestCoins));
            }
            playCoinSound();
          }
        }

        for (const ob of obstacles) {
          const inset = ob.type === "torch" ? 10 : 8;
          if (rectsOverlap(statueBox, {
            x: ob.x + inset,
            y: ob.y + 8,
            w: ob.w - inset * 2,
            h: ob.h - 8
          })) {
            if (powerMode) {
              smashObstacle(ob);
            } else {
              endGame();
              return;
            }
          }
        }

        for (const hazard of hazards) {
          if (rectsOverlap(statueBox, {
            x: hazard.x + 12,
            y: hazard.y - hazard.h / 2,
            w: hazard.w - 18,
            h: hazard.h
          })) {
            if (powerMode) {
              smashObstacle(hazard);
            } else {
              endGame();
              return;
            }
          }
        }

        if (bonusTimer <= 0 && sevenCooldownTimer <= 0) {
          for (const seven of sevens) {
            const cx = seven.x + seven.size * 0.5;
            const cy = seven.y + Math.sin(seven.bob) * 10;
            if (circleRectOverlap(cx, cy, seven.size * 0.42, statueBox)) {
              seven.collected = true;
              streak += 1;
              goldFlash = 0.16;
              playSevenSound();
              if (streak >= 3) {
                streak = 0;
                bonusTimer = 5;
                goldFlash = 1;
                shakeTimer = 0.55;
                shakePower = 9;
                playPowerSound();
              }
            }
          }
        }
      }

      function getStatueBox() {
        if (bonusTimer > 0) {
          return {
            x: statue.x - statue.w * 0.7,
            y: groundY - statue.h * 3,
            w: statue.w * 2.45,
            h: statue.h * 3
          };
        }
        if (statue.sliding && statue.grounded) {
          return {
            x: statue.x + 8,
            y: groundY - 74,
            w: statue.w + 22,
            h: 64
          };
        }
        return {
          x: statue.x + 14,
          y: statue.y - statue.h + 12,
          w: statue.w - 24,
          h: statue.h - 18
        };
      }

      function smashObstacle(item) {
        item.x = -999;
        shakeTimer = 0.22;
        shakePower = 12;
        goldFlash = Math.max(goldFlash, 0.12);
        for (let i = 0; i < 18; i++) {
          dust.push({
            x: statue.x + 110 + Math.random() * 82,
            y: groundY - 85 + Math.random() * 92,
            r: 3 + Math.random() * 7,
            life: 0.42 + Math.random() * 0.3,
            vx: -260 + Math.random() * 190
          });
        }
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function circleRectOverlap(cx, cy, radius, rect) {
        const nx = clamp(cx, rect.x, rect.x + rect.w);
        const ny = clamp(cy, rect.y, rect.y + rect.h);
        return (cx - nx) ** 2 + (cy - ny) ** 2 < radius ** 2;
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        ctx.save();
        if (shakeTimer > 0) {
          const strength = shakePower * (shakeTimer / 0.55);
          ctx.translate((Math.random() - 0.5) * strength, (Math.random() - 0.5) * strength);
        }
        drawSky();
        drawWatermark();
        drawLandscape();
        drawTemples();
        drawGround();
        drawDust();
        obstacles.forEach(drawObstacle);
        hazards.forEach(drawHazard);
        coins.forEach(drawCoin);
        sevens.forEach(drawSeven);
        drawStatue();
        ctx.restore();
        drawHud();
        drawBonusFlash();
      }

      function drawSky() {
        const phase = getDayPhase();
        const sky = ctx.createLinearGradient(0, 0, 0, H);
        sky.addColorStop(0, phaseColor("#68bdf5", "#f67d37", "#081328", phase));
        sky.addColorStop(0.48, phaseColor("#bfe9ff", "#f7b35a", "#15234a", phase));
        sky.addColorStop(0.75, phaseColor("#f4d89b", "#e8803b", "#251d3a", phase));
        sky.addColorStop(1, phaseColor("#dfb05e", "#9b5734", "#161326", phase));
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, H);

        drawStars(phase.night);

        ctx.fillStyle = `rgba(255,255,255,${0.72 - phase.night * 0.42})`;
        for (let i = 0; i < 5; i++) {
          const x = ((i * 290 - distance * 0.08) % 1500) - 150;
          drawCloud(x, 82 + (i % 3) * 46, 1 + (i % 2) * 0.35);
        }
      }

      function getDayPhase() {
        const progress = clamp(distance / 9000, 0, 1);
        return {
          sunset: clamp((progress - 0.22) / 0.34, 0, 1),
          night: clamp((progress - 0.58) / 0.26, 0, 1)
        };
      }

      function phaseColor(day, sunset, night, phase) {
        return mixColor(mixColor(day, sunset, phase.sunset), night, phase.night);
      }

      function mixColor(a, b, t) {
        const pa = parseColor(a);
        const pb = parseColor(b);
        return `rgb(${Math.round(pa.r + (pb.r - pa.r) * t)}, ${Math.round(pa.g + (pb.g - pa.g) * t)}, ${Math.round(pa.b + (pb.b - pa.b) * t)})`;
      }

      function parseColor(color) {
        if (color.startsWith("rgb")) {
          const [r, g, b] = color.match(/\d+/g).map(Number);
          return { r, g, b };
        }
        const value = parseInt(color.slice(1), 16);
        return { r: value >> 16, g: (value >> 8) & 255, b: value & 255 };
      }

      function drawStars(alpha) {
        if (alpha <= 0.02) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "#fff8d4";
        for (let i = 0; i < 80; i++) {
          const x = (i * 157 + Math.sin(i * 12.7) * 80 - distance * 0.03) % (W + 80) - 40;
          const y = 26 + ((i * 83) % 275);
          const r = 1 + (i % 3) * 0.55;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawCloud(x, y, s) {
        ctx.beginPath();
        ctx.ellipse(x, y, 48 * s, 18 * s, 0, 0, Math.PI * 2);
        ctx.ellipse(x + 42 * s, y - 8 * s, 42 * s, 21 * s, 0, 0, Math.PI * 2);
        ctx.ellipse(x + 88 * s, y, 52 * s, 18 * s, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawWatermark() {
        ctx.save();
        ctx.globalAlpha = 0.09;
        ctx.fillStyle = "#b9172c";
        ctx.font = "900 176px Georgia";
        ctx.textAlign = "center";
        for (let i = 0; i < 4; i++) {
          const x = ((i * 430 - distance * 0.12) % 1700) - 230;
          ctx.fillText("777", x, 265 + (i % 2) * 110);
        }
        ctx.restore();
      }

      function drawLandscape() {
        drawHill("#f6d68e", 0.18, 440, 72);
        drawHill("#d9ad61", 0.28, 500, 96);
        drawHill("#b98048", 0.42, 560, 72);
      }

      function drawHill(color, speed, base, amp) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, H);
        for (let x = 0; x <= W + 32; x += 32) {
          const y = base + Math.sin((x + distance * speed) * 0.008) * amp * 0.32
            + Math.sin((x + distance * speed) * 0.019) * amp * 0.18;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H);
        ctx.closePath();
        ctx.fill();
      }

      function drawTemples() {
        for (let i = 0; i < 5; i++) {
          const x = ((i * 355 - distance * 0.26) % 1700) - 230;
          drawTemple(x, 338 + (i % 2) * 34, 0.72 + (i % 3) * 0.1);
        }
      }

      function drawTemple(x, y, s) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(s, s);
        ctx.fillStyle = "rgba(83, 72, 72, 0.18)";
        ctx.fillRect(16, 128, 230, 16);
        ctx.fillStyle = "#fbf5e8";
        ctx.strokeStyle = "#d8c8aa";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(12, 48);
        ctx.lineTo(132, 0);
        ctx.lineTo(254, 48);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#eee2cc";
        ctx.fillRect(28, 50, 210, 18);
        ctx.fillStyle = "#fffaf0";
        for (let c = 0; c < 6; c++) {
          const cx = 44 + c * 34;
          ctx.fillRect(cx, 68, 16, 64);
          ctx.fillStyle = "#dfd2bd";
          ctx.fillRect(cx + 5, 68, 2, 64);
          ctx.fillStyle = "#fffaf0";
        }
        ctx.fillStyle = "#e8d8bc";
        ctx.fillRect(20, 132, 226, 18);
        ctx.restore();
      }

      function drawGround() {
        const grd = ctx.createLinearGradient(0, groundY - 18, 0, H);
        grd.addColorStop(0, "#f2cc7a");
        grd.addColorStop(1, "#8a5837");
        ctx.fillStyle = grd;
        ctx.fillRect(0, groundY, W, H - groundY);

        ctx.strokeStyle = "rgba(255, 248, 236, 0.35)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, groundY + 2);
        ctx.lineTo(W, groundY + 2);
        ctx.stroke();

        for (let i = 0; i < 32; i++) {
          const x = ((i * 72 - distance * 0.9) % (W + 90)) - 40;
          ctx.fillStyle = i % 2 ? "rgba(255,255,255,0.12)" : "rgba(100,61,39,0.17)";
          ctx.fillRect(x, groundY + 32 + (i % 3) * 24, 34 + (i % 4) * 16, 4);
        }
      }

      function drawDust() {
        dust.forEach((p) => {
          ctx.fillStyle = `rgba(255, 239, 199, ${clamp(p.life * 1.7, 0, 0.7)})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawObstacle(ob) {
        ctx.save();
        ctx.translate(ob.x + ob.w / 2, ob.y + ob.h / 2);
        ctx.rotate(ob.type === "boulder" ? distance * 0.02 : 0);
        ctx.translate(-ob.w / 2, -ob.h / 2);

        if (ob.type === "boulder") {
          const cx = ob.w / 2;
          const cy = ob.h / 2;
          const r = Math.min(ob.w, ob.h) * 0.45;
          const stone = ctx.createRadialGradient(cx - r * 0.35, cy - r * 0.4, 3, cx, cy, r);
          stone.addColorStop(0, "#d8d2c7");
          stone.addColorStop(0.5, "#88827a");
          stone.addColorStop(1, "#3f3d3b");
          ctx.fillStyle = "rgba(0,0,0,0.2)";
          ctx.beginPath();
          ctx.ellipse(cx, cy + r * 0.82, r * 0.9, r * 0.2, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = stone;
          ctx.strokeStyle = "#5f5b57";
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.strokeStyle = "rgba(45, 42, 39, 0.65)";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(cx - 8, cy - 5, r * 0.45, 0.2, 4.4);
          ctx.moveTo(cx - r * 0.6, cy + 4);
          ctx.quadraticCurveTo(cx, cy - 18, cx + r * 0.7, cy + 9);
          ctx.stroke();
        } else {
          const torchCount = 4;
          for (let i = 0; i < torchCount; i++) {
            const tx = 18 + i * 28;
            ctx.strokeStyle = "#5f351d";
            ctx.lineWidth = 7;
            ctx.beginPath();
            ctx.moveTo(tx, ob.h - 4);
            ctx.lineTo(tx, 34);
            ctx.stroke();
            ctx.fillStyle = "#d7c2a2";
            ctx.fillRect(tx - 8, 28, 16, 12);
            const flame = ctx.createRadialGradient(tx, 12, 2, tx, 17, 24);
            flame.addColorStop(0, "#fff8ad");
            flame.addColorStop(0.38, "#ffb21f");
            flame.addColorStop(1, "#e31937");
            ctx.fillStyle = flame;
            ctx.beginPath();
            ctx.moveTo(tx, 0);
            ctx.bezierCurveTo(tx + 20, 19, tx + 8, 42, tx, 38);
            ctx.bezierCurveTo(tx - 15, 36, tx - 17, 18, tx, 0);
            ctx.fill();
          }
          ctx.fillStyle = "rgba(255, 72, 32, 0.26)";
          ctx.fillRect(2, ob.h - 18, ob.w - 4, 14);
        }
        ctx.restore();
      }

      function drawHazard(hazard) {
        ctx.save();
        ctx.translate(hazard.x, hazard.y);
        ctx.shadowColor = "rgba(0,0,0,0.25)";
        ctx.shadowBlur = 5;
        if (hazard.type === "medusa") {
          const cx = hazard.w / 2;
          const cy = 0;
          ctx.fillStyle = "#70c091";
          for (let i = 0; i < 9; i++) {
            const a = i / 8 * Math.PI * 2;
            const sx = cx + Math.cos(a) * 28;
            const sy = cy + Math.sin(a) * 25;
            ctx.strokeStyle = "#38ff7a";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(cx, cy - 5);
            ctx.quadraticCurveTo(sx + Math.sin(hazard.spin + i) * 18, sy + Math.cos(hazard.spin + i) * 10, sx, sy);
            ctx.stroke();
            ctx.fillStyle = "#fff2b0";
            ctx.beginPath();
            ctx.arc(sx, sy, 4, 0, Math.PI * 2);
            ctx.fill();
          }
          const face = ctx.createRadialGradient(cx - 8, cy - 8, 6, cx, cy, 34);
          face.addColorStop(0, "#d4ffe1");
          face.addColorStop(0.55, "#67b587");
          face.addColorStop(1, "#244f3a");
          ctx.fillStyle = face;
          ctx.strokeStyle = "#173324";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.ellipse(cx, cy, 28, 32, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#fff8ec";
          ctx.beginPath();
          ctx.ellipse(cx - 9, cy - 5, 6, 4, 0, 0, Math.PI * 2);
          ctx.ellipse(cx + 9, cy - 5, 6, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#e31937";
          ctx.beginPath();
          ctx.arc(cx - 9, cy - 5, 2.5, 0, Math.PI * 2);
          ctx.arc(cx + 9, cy - 5, 2.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#173324";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(cx - 11, cy + 15);
          ctx.quadraticCurveTo(cx, cy + 22, cx + 11, cy + 15);
          ctx.stroke();
        } else {
          const dir = hazard.angle || 1;
          ctx.save();
          ctx.rotate(dir * 0.42);
          ctx.shadowColor = "#fff8a8";
          ctx.shadowBlur = 18;
          ctx.strokeStyle = "#fff8a8";
          ctx.lineWidth = 12;
          ctx.beginPath();
          ctx.moveTo(0, -48);
          ctx.lineTo(42, -10);
          ctx.lineTo(22, 0);
          ctx.lineTo(76, 50);
          ctx.lineTo(55, 55);
          ctx.lineTo(128, 94);
          ctx.stroke();
          ctx.strokeStyle = "#ffd400";
          ctx.lineWidth = 6;
          ctx.stroke();
          ctx.restore();
        }
        ctx.restore();
      }

      function drawCoin(coin) {
        ctx.save();
        ctx.translate(coin.x, coin.y);
        ctx.shadowColor = "rgba(72, 42, 7, 0.45)";
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 5;
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.beginPath();
        ctx.ellipse(1, coin.r * 0.72, coin.r * 0.9, coin.r * 0.22, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = "#ffdf22";
        ctx.shadowBlur = 18;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.shadowColor = "#ffdf22";
        const shine = ctx.createRadialGradient(-coin.r * 0.42, -coin.r * 0.46, 1, coin.r * 0.12, coin.r * 0.12, coin.r * 1.08);
        shine.addColorStop(0, "#ffffff");
        shine.addColorStop(0.14, "#fffbd2");
        shine.addColorStop(0.36, "#ffec28");
        shine.addColorStop(0.64, "#ffc400");
        shine.addColorStop(1, "#9a5700");
        ctx.fillStyle = shine;
        ctx.strokeStyle = "#6f3d06";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, coin.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "#fff1a6";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(0, 0, coin.r * 0.78, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = "rgba(95, 49, 3, 0.72)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, coin.r * 0.55, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
        ctx.beginPath();
        ctx.ellipse(-coin.r * 0.38, -coin.r * 0.42, coin.r * 0.38, coin.r * 0.19, -0.55, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255, 246, 172, 0.55)";
        ctx.beginPath();
        ctx.arc(coin.r * 0.3, coin.r * 0.28, coin.r * 0.18, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawSeven(seven) {
        const y = seven.y + Math.sin(seven.bob) * 10;
        ctx.save();
        ctx.translate(seven.x + seven.size / 2, y);
        ctx.shadowColor = "#ff1f3d";
        ctx.shadowBlur = 22;
        ctx.fillStyle = "#e31937";
        ctx.strokeStyle = "#ffe18a";
        ctx.lineWidth = 3;
        ctx.font = `900 ${seven.size}px Georgia`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.strokeText("7", 0, 0);
        ctx.fillText("7", 0, 0);
        ctx.restore();
      }

      function drawStatue() {
        const spritePowerMode = bonusTimer > 0;
        const spriteScale = spritePowerMode ? 3 : 1;
        const walkFrame = Math.floor(statue.stride * 2.4) % 2 === 0 ? playerSprites.walk1 : playerSprites.walk2;
        const slideSprite = playerSprites.slide.complete ? playerSprites.slide : playerSprites.duck;
        const sprite = statue.sliding && statue.grounded ? slideSprite : (!statue.grounded ? playerSprites.jump : walkFrame);
        const targetH = statue.sliding && statue.grounded ? 116 : 184;
        const fallbackW = statue.sliding && statue.grounded ? 136 : 104;
        const aspect = sprite.naturalWidth && sprite.naturalHeight ? sprite.naturalWidth / sprite.naturalHeight : fallbackW / targetH;
        const drawH = targetH * spriteScale;
        const drawW = drawH * aspect;
        const drawX = statue.x - (spriteScale - 1) * 48 - 12;
        const spriteBaseY = statue.sliding && statue.grounded ? groundY : statue.y;
        const drawY = spriteBaseY - drawH + (statue.sliding && statue.grounded ? 8 * spriteScale : 0);

        ctx.save();
        if (spritePowerMode) {
          ctx.shadowColor = "#ffd76a";
          ctx.shadowBlur = 34;
        } else {
          ctx.shadowColor = "rgba(0,0,0,0.24)";
          ctx.shadowBlur = 8;
        }
        ctx.shadowOffsetY = 5;

        if (sprite.complete && sprite.naturalWidth) {
          ctx.drawImage(sprite, drawX, drawY, drawW, drawH);
        }

        if (spritePowerMode) {
          ctx.globalCompositeOperation = "lighter";
          ctx.strokeStyle = "rgba(255, 215, 106, 0.75)";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.ellipse(statue.x + 48, spriteBaseY - drawH * 0.48, drawW * 0.46, drawH * 0.54, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
        return;

        const x = statue.x;
        const powerMode = bonusTimer > 0;
        const scale = powerMode ? 3 : 1;
        const top = statue.y - statue.h * scale;
        const stride = Math.sin(statue.stride);
        const strideCos = Math.cos(statue.stride);
        const arm = Math.sin(statue.stride + Math.PI);
        const slideLean = statue.sliding && statue.grounded ? 0.78 : 1;
        const slideOffset = statue.sliding && statue.grounded ? 72 : 0;
        const darkSuit = "#111827";
        const suitMid = "#1f2a44";
        const gold = "#ffd76a";
        const capeRed = "#b9142e";

        ctx.save();
        ctx.translate(x - (scale - 1) * 43, top + slideOffset);
        ctx.scale(scale, scale * slideLean);
        if (powerMode) {
          ctx.shadowColor = "#ffd76a";
          ctx.shadowBlur = 34;
        }
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        if (!powerMode) ctx.shadowColor = "rgba(0,0,0,0.2)";
        if (!powerMode) ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 5;

        const legLift = statue.sliding ? 26 : 0;
        const capeWave = Math.sin(statue.stride * 0.85) * 12;
        const capeBillow = Math.cos(statue.stride * 1.15) * 10;
        const speedTilt = statue.sliding ? -0.22 : -0.06;
        const run = statue.stride;
        const front = Math.sin(run);
        const back = -front;

        ctx.strokeStyle = "rgba(255,255,255,0.86)";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(34, 53);
        ctx.bezierCurveTo(-34 - capeBillow, 62 + capeWave, -52, 108 - capeWave, -12 - capeBillow, 160);
        ctx.bezierCurveTo(9, 138 + capeWave, 32, 102, 45, 58);
        ctx.closePath();
        ctx.stroke();

        const cape = ctx.createLinearGradient(-32, 52, 58, 154);
        cape.addColorStop(0, "#e31937");
        cape.addColorStop(0.62, capeRed);
        cape.addColorStop(1, "#631021");
        ctx.fillStyle = cape;
        ctx.beginPath();
        ctx.moveTo(34, 53);
        ctx.bezierCurveTo(-34 - capeBillow, 62 + capeWave, -52, 108 - capeWave, -12 - capeBillow, 160);
        ctx.bezierCurveTo(9, 138 + capeWave, 32, 102, 45, 58);
        ctx.closePath();
        ctx.fill();

        ctx.save();
        ctx.translate(48, 88);
        ctx.rotate(speedTilt);
        ctx.translate(-48, -88);

        function heroLimb(x1, y1, x2, y2, x3, y3, width, boot) {
          ctx.strokeStyle = "rgba(255,255,255,0.9)";
          ctx.lineWidth = width + 5;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.quadraticCurveTo(x2, y2, x3, y3);
          ctx.stroke();

          const limb = ctx.createLinearGradient(x1, y1, x3, y3);
          limb.addColorStop(0, suitMid);
          limb.addColorStop(0.52, darkSuit);
          limb.addColorStop(1, boot ? "#05070d" : "#18233a");
          ctx.strokeStyle = limb;
          ctx.lineWidth = width;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.quadraticCurveTo(x2, y2, x3, y3);
          ctx.stroke();

          ctx.strokeStyle = gold;
          ctx.lineWidth = Math.max(2, width * 0.18);
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.quadraticCurveTo(x2, y2, x3, y3);
          ctx.stroke();
        }

        function drawProfileSegment(x1, y1, x2, y2, widthA, widthB, colorEnd = "#080b14") {
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const nx = Math.cos(angle + Math.PI / 2);
            const ny = Math.sin(angle + Math.PI / 2);
            const limb = ctx.createLinearGradient(x1, y1, x2, y2);
            limb.addColorStop(0, suitMid);
            limb.addColorStop(0.5, darkSuit);
          limb.addColorStop(1, colorEnd);

            ctx.fillStyle = "rgba(255,255,255,0.92)";
            ctx.beginPath();
            ctx.moveTo(x1 + nx * (widthA + 3), y1 + ny * (widthA + 3));
            ctx.lineTo(x2 + nx * (widthB + 3), y2 + ny * (widthB + 3));
            ctx.lineTo(x2 - nx * (widthB + 3), y2 - ny * (widthB + 3));
            ctx.lineTo(x1 - nx * (widthA + 3), y1 - ny * (widthA + 3));
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = limb;
            ctx.beginPath();
            ctx.moveTo(x1 + nx * widthA, y1 + ny * widthA);
            ctx.quadraticCurveTo((x1 + x2) / 2 + nx * 3, (y1 + y2) / 2 + ny * 3, x2 + nx * widthB, y2 + ny * widthB);
            ctx.lineTo(x2 - nx * widthB, y2 - ny * widthB);
            ctx.quadraticCurveTo((x1 + x2) / 2 - nx * 3, (y1 + y2) / 2 - ny * 3, x1 - nx * widthA, y1 - ny * widthA);
            ctx.closePath();
            ctx.fill();
        }

        function drawProfileLeg(phase, visible) {
          const lift = Math.max(0, phase);
          const kick = Math.max(0, -phase);
          const hipX = 47 - visible * 2;
          const hipY = 112 + legLift;
          const kneeX = hipX + 36 * lift - 24 * kick;
          const kneeY = hipY + 26 - 31 * lift + 15 * kick;
          const footX = hipX + 54 * lift - 52 * kick;
          const footY = hipY + 63 - 3 * lift - 22 * kick;

          drawProfileSegment(hipX, hipY, kneeX, kneeY, visible ? 13 : 10, visible ? 11 : 8);
          drawProfileSegment(kneeX, kneeY, footX, footY, visible ? 11 : 8, visible ? 8 : 6);

          ctx.fillStyle = gold;
          ctx.beginPath();
          ctx.ellipse(kneeX, kneeY, visible ? 8 : 6, visible ? 7 : 5, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#05070d";
          ctx.strokeStyle = "rgba(255,255,255,0.9)";
          ctx.lineWidth = visible ? 3 : 2;
          ctx.beginPath();
          ctx.ellipse(footX + 12, footY + 4, visible ? 19 : 15, visible ? 7 : 5, 0.08, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          if (visible) {
            ctx.strokeStyle = gold;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(hipX, hipY + 2);
            ctx.quadraticCurveTo(kneeX, kneeY, footX, footY);
            ctx.stroke();
          }
        }

        drawProfileLeg(back, false);

        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.beginPath();
        ctx.ellipse(51, 79, 26, 51, -0.11, 0, Math.PI * 2);
        ctx.fill();

        const torso = ctx.createLinearGradient(27, 35, 75, 129);
        torso.addColorStop(0, "#2b3a61");
        torso.addColorStop(0.46, darkSuit);
        torso.addColorStop(1, "#070a12");
        ctx.fillStyle = torso;
        ctx.beginPath();
        ctx.moveTo(36, 47);
        ctx.quadraticCurveTo(61, 42, 73, 59);
        ctx.quadraticCurveTo(69, 94, 58, 127);
        ctx.lineTo(41, 128);
        ctx.quadraticCurveTo(30, 96, 32, 61);
        ctx.quadraticCurveTo(32, 51, 36, 47);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = gold;
        ctx.beginPath();
        ctx.moveTo(55, 50);
        ctx.lineTo(67, 76);
        ctx.lineTo(58, 76);
        ctx.lineTo(64, 116);
        ctx.lineTo(42, 72);
        ctx.lineTo(52, 72);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = gold;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(36, 54);
        ctx.quadraticCurveTo(54, 66, 72, 59);
        ctx.moveTo(39, 126);
        ctx.lineTo(59, 126);
        ctx.stroke();

        drawProfileLeg(front, true);

        const shoulderX = 58;
        const shoulderY = 62;
        const elbowX = shoulderX + 28 * Math.max(0, -arm) - 18 * Math.max(0, arm);
        const elbowY = shoulderY + 29 + 10 * Math.abs(arm);
        const handX = elbowX + 28 * Math.max(0, -arm) - 26 * Math.max(0, arm);
        const handY = elbowY + 14 - 12 * Math.max(0, -arm);
        drawProfileSegment(shoulderX, shoulderY, elbowX, elbowY, 8, 7, "#18233a");
        drawProfileSegment(elbowX, elbowY, handX, handY, 7, 5, "#18233a");
        ctx.fillStyle = gold;
        ctx.beginPath();
        ctx.ellipse(elbowX, elbowY, 6, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 215, 106, 0.55)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(52, 78, 31 + strideCos * 2, 55, -0.1, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255, 215, 106, 0.55)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "#151d33";
        ctx.strokeStyle = "rgba(255,255,255,0.92)";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.ellipse(55, 23, 19, 23, 0.08, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#0a0d18";
        ctx.beginPath();
        ctx.moveTo(38, 17);
        ctx.quadraticCurveTo(55, 2, 72, 15);
        ctx.quadraticCurveTo(66, 10, 62, 6);
        ctx.quadraticCurveTo(48, 2, 40, 10);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = gold;
        ctx.beginPath();
        ctx.moveTo(44, 21);
        ctx.quadraticCurveTo(56, 14, 72, 22);
        ctx.quadraticCurveTo(64, 29, 46, 26);
        ctx.fill();

        ctx.fillStyle = "#fff7d1";
        ctx.beginPath();
        ctx.ellipse(64, 22, 4.5, 2.5, 0.08, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#ffd76a";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(57, 35);
        ctx.quadraticCurveTo(64, 39, 70, 34);
        ctx.stroke();
        ctx.restore();

        if (powerMode) {
          ctx.globalCompositeOperation = "lighter";
          ctx.strokeStyle = "rgba(255, 215, 106, 0.75)";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.ellipse(48, 92, 58, 104, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawLimb(x1, y1, x2, y2, x3, y3, width) {
        ctx.strokeStyle = "#eeeae2";
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(x2, y2, x3, y3);
        ctx.stroke();
        ctx.strokeStyle = "rgba(119, 113, 108, 0.26)";
        ctx.lineWidth = Math.max(2, width * 0.18);
        ctx.stroke();
      }

      function drawHud() {
        ctx.save();
        ctx.fillStyle = "#ffd76a";
        ctx.strokeStyle = "rgba(65, 37, 13, 0.6)";
        ctx.lineWidth = 5;
        ctx.font = "900 42px Cinzel, Georgia, serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        const text = `Coins: ${coinCount.toLocaleString()}   Best: ${bestCoins.toLocaleString()}`;
        ctx.strokeText(text, 30, 24);
        ctx.fillText(text, 30, 24);

        ctx.font = "800 28px Georgia";
        ctx.textAlign = "right";
        const bonusText = bonusTimer > 0 ? `777 POWER MODE ${Math.ceil(bonusTimer)}s` : `7 Streak ${streak}/3`;
        ctx.strokeText(bonusText, W - 30, 34);
        ctx.fillStyle = bonusTimer > 0 ? "#fff2ad" : "#e31937";
        ctx.fillText(bonusText, W - 30, 34);
        ctx.restore();
      }

      function drawBonusFlash() {
        if (goldFlash <= 0) return;
        ctx.save();
        ctx.globalAlpha = clamp(goldFlash, 0, 0.55);
        ctx.fillStyle = "#ffd76a";
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = clamp(goldFlash * 0.9, 0, 0.8);
        ctx.strokeStyle = "#fff6ba";
        ctx.lineWidth = 16;
        ctx.strokeRect(12, 12, W - 24, H - 24);
        ctx.restore();
      }

      function loop(time) {
        if (state !== "playing") {
          draw();
          return;
        }
        const dt = Math.min(0.033, (time - lastTime) / 1000 || 0);
        lastTime = time;
        update(dt);
        draw();
        if (state === "playing") requestAnimationFrame(loop);
      }

      startButton.addEventListener("click", startGame);
      restartButton.addEventListener("click", startGame);
      muteButton.addEventListener("click", () => {
        ensureAudio();
        setMusicMuted(!musicMuted);
      });
      window.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
          event.preventDefault();
          jump();
        }
        if (event.code === "ArrowDown") {
          event.preventDefault();
          slide();
        }
      });
      let touchStartY = 0;
      let touchStartX = 0;
      function handleTouchGesture(endX, endY) {
        const dy = endY - touchStartY;
        const dx = Math.abs(endX - touchStartX);
        if (dy > 45 && dy > dx * 1.15) {
          slide();
        } else {
          jump();
        }
      }

      window.addEventListener("pointerdown", (event) => {
        touchStartY = event.clientY;
        touchStartX = event.clientX;
        if (event.target.tagName !== "BUTTON" && event.pointerType === "mouse") jump();
      });
      window.addEventListener("pointerup", (event) => {
        if (event.target.tagName === "BUTTON" || event.pointerType !== "mouse") return;
      });
      window.addEventListener("touchstart", (event) => {
        if (event.target.tagName === "BUTTON" || event.touches.length === 0) return;
        touchStartY = event.touches[0].clientY;
        touchStartX = event.touches[0].clientX;
        event.preventDefault();
      }, { passive: false });
      window.addEventListener("touchend", (event) => {
        if (event.target.tagName === "BUTTON" || event.changedTouches.length === 0) return;
        handleTouchGesture(event.changedTouches[0].clientX, event.changedTouches[0].clientY);
        event.preventDefault();
      }, { passive: false });

      draw();
    })();
  </script>
</body>
</html>
