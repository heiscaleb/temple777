<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temple Run 777</title>
  <style>
    :root {
      color-scheme: dark;
      --gold: #ffd76a;
      --deep-gold: #c88c20;
      --red: #e31937;
      --white: #fff8ec;
      --ink: #2f2530;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #15101a;
      font-family: Georgia, "Times New Roman", serif;
      touch-action: manipulation;
      user-select: none;
    }

    .game-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 18%, rgba(255, 215, 106, 0.24), transparent 28%),
        linear-gradient(180deg, #1e2037 0%, #342739 45%, #5d3d35 100%);
    }

    canvas {
      width: min(100vw, 1200px);
      height: min(100vh, 720px);
      max-width: 100vw;
      max-height: 100vh;
      display: block;
      background: #8bc7f4;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--white);
      text-align: center;
      background: linear-gradient(180deg, rgba(26, 16, 28, 0.74), rgba(46, 29, 30, 0.62));
    }

    .panel {
      width: min(92vw, 560px);
      padding: 32px 28px;
      border: 2px solid rgba(255, 215, 106, 0.68);
      border-radius: 8px;
      background: rgba(39, 27, 31, 0.78);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(8px);
    }

    .lucky {
      margin: 0 0 6px;
      color: var(--red);
      font-size: clamp(86px, 20vw, 164px);
      line-height: 0.82;
      text-shadow:
        0 0 14px rgba(255, 37, 62, 0.85),
        0 8px 0 rgba(93, 16, 22, 0.55),
        0 0 46px rgba(255, 215, 106, 0.24);
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 72px);
      line-height: 1;
      color: var(--white);
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.28);
      letter-spacing: 0;
    }

    .tagline {
      margin: 16px 0 26px;
      color: var(--gold);
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 700;
      letter-spacing: 0;
    }

    .hint {
      margin: 14px 0 0;
      color: rgba(255, 248, 236, 0.82);
      font-size: 16px;
      font-family: Arial, sans-serif;
    }

    button {
      min-width: 170px;
      border: 0;
      border-radius: 8px;
      padding: 15px 24px;
      color: #341300;
      background: linear-gradient(180deg, #ffe893, #d59728);
      box-shadow: 0 5px 0 #8b5613, 0 12px 30px rgba(0, 0, 0, 0.3);
      font: 800 18px Arial, sans-serif;
      cursor: pointer;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #8b5613, 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    .mute-button {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 5;
      width: 42px;
      height: 42px;
      min-width: 42px;
      padding: 0;
      border: 1px solid rgba(255, 248, 236, 0.46);
      color: #fff8ec;
      background: rgba(42, 25, 28, 0.72);
      box-shadow: 0 3px 0 rgba(116, 76, 16, 0.72), 0 10px 24px rgba(0, 0, 0, 0.22);
      font-size: 18px;
      line-height: 42px;
      backdrop-filter: blur(6px);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 560px) {
      .panel {
        padding: 26px 18px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="Temple Run 777 game">
    <canvas id="game" width="1200" height="720"></canvas>
  </main>
  <audio id="bgMusic" src="https://raw.githubusercontent.com/heiscaleb/temple777-assets/main/bombinsound-hip-hop-background-514147.mp3" loop preload="auto"></audio>
  <button id="muteButton" class="mute-button" type="button" aria-label="Turn music off">🔊</button>

  <section id="startScreen" class="overlay">
    <div class="panel">
      <p class="lucky">777</p>
      <h1>Temple Run 777</h1>
      <p class="tagline">Wealth. Health. Psychology.</p>
      <button id="startButton" type="button">Start</button>
      <p class="hint">Space/tap to jump twice. Down arrow or swipe down to slide.</p>
    </div>
  </section>

  <section id="gameOverScreen" class="overlay hidden">
    <div class="panel">
      <p class="lucky">777</p>
      <h1>Game Over</h1>
      <p id="finalScore" class="tagline">Final Score: 0</p>
      <button id="restartButton" type="button">Restart</button>
    </div>
  </section>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const startScreen = document.getElementById("startScreen");
      const gameOverScreen = document.getElementById("gameOverScreen");
      const finalScore = document.getElementById("finalScore");
      const startButton = document.getElementById("startButton");
      const restartButton = document.getElementById("restartButton");
      const muteButton = document.getElementById("muteButton");
      const bgMusic = document.getElementById("bgMusic");

      const W = canvas.width;
      const H = canvas.height;
      const groundY = 590;
      const gravity = 2700;
      const jumpVelocity = -980;
      const statue = {
        x: 172,
        y: groundY,
        w: 86,
        h: 178,
        vy: 0,
        grounded: true,
        stride: 0,
        jumps: 0,
        sliding: false,
        slideTimer: 0
      };

      let state = "start";
      let lastTime = 0;
      let gameTime = 0;
      let score = 0;
      let worldSpeed = 560;
      let distance = 0;
      let obstacleTimer = 0;
      let hazardTimer = 0;
      let coinTimer = 0;
      let lastDangerSpawnTime = -999;
      let nextDangerType = "ground";
      let sevenTimer = 0;
      let bonusTimer = 0;
      let sevenCooldownTimer = 0;
      let goldFlash = 0;
      let shakeTimer = 0;
      let shakePower = 0;
      let streak = 0;
      let obstacles = [];
      let hazards = [];
      let coins = [];
      let sevens = [];
      let dust = [];
      let audioCtx = null;
      let musicGain = null;
      let musicMuted = false;
      let musicPlaying = false;
      let musicNextTime = 0;
      let musicStep = 0;

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

      function resetGame() {
        score = 0;
        gameTime = 0;
        worldSpeed = 560;
        distance = 0;
        obstacleTimer = 5;
        hazardTimer = 5;
        coinTimer = 2.2;
        lastDangerSpawnTime = -999;
        nextDangerType = "ground";
        sevenTimer = 6.5;
        bonusTimer = 0;
        sevenCooldownTimer = 0;
        goldFlash = 0;
        shakeTimer = 0;
        shakePower = 0;
        streak = 0;
        obstacles = [];
        hazards = [];
        coins = [];
        sevens = [];
        dust = [];
        statue.y = groundY;
        statue.vy = 0;
        statue.grounded = true;
        statue.stride = 0;
        statue.jumps = 0;
        statue.sliding = false;
        statue.slideTimer = 0;
        lastTime = performance.now();
      }

      function startGame() {
        ensureAudio();
        resetGame();
        startMusic();
        state = "playing";
        startScreen.classList.add("hidden");
        gameOverScreen.classList.add("hidden");
        requestAnimationFrame(loop);
      }

      function endGame() {
        state = "over";
        stopMusic();
        playCrashSound();
        setTimeout(playGameOverSound, 130);
        finalScore.textContent = `Final Score: ${Math.floor(score).toLocaleString()}`;
        gameOverScreen.classList.remove("hidden");
      }

      function jump() {
        if (state === "start") {
          startGame();
          return;
        }
        if (state === "over") {
          startGame();
          return;
        }
        if (statue.jumps < 2 && !statue.sliding) {
          statue.vy = jumpVelocity;
          statue.grounded = false;
          statue.jumps += 1;
          playJumpSound();
          for (let i = 0; i < 10; i++) {
            dust.push({
              x: statue.x + 28 + Math.random() * 35,
              y: groundY - 6 + Math.random() * 8,
              r: 2 + Math.random() * 5,
              life: 0.45 + Math.random() * 0.25,
              vx: -120 - Math.random() * 100
            });
          }
        }
      }

      function slide() {
        if (state !== "playing" || !statue.grounded) return;
        statue.sliding = true;
        statue.slideTimer = 0.72;
        for (let i = 0; i < 12; i++) {
          dust.push({
            x: statue.x + 30 + Math.random() * 78,
            y: groundY - 4 + Math.random() * 10,
            r: 2 + Math.random() * 5,
            life: 0.38 + Math.random() * 0.22,
            vx: -180 - Math.random() * 170
          });
        }
      }

      function spawnObstacle() {
        const isColumn = Math.random() < 0.58;
        const width = isColumn ? 64 + Math.random() * 24 : 76 + Math.random() * 34;
        const height = isColumn ? 82 + Math.random() * 34 : 54 + Math.random() * 42;
        obstacles.push({
          x: W + 40,
          y: groundY - height,
          w: width,
          h: height,
          type: isColumn ? "column" : "block",
          rotation: (Math.random() - 0.5) * 0.18,
          passed: false
        });
        lastDangerSpawnTime = gameTime;
      }

      function spawnHazard() {
        const arrowChance = clamp(0.55 + getDifficultyLevel() * 0.08, 0.55, 0.9);
        hazards.push({
          x: W + 70,
          y: groundY - 132 - Math.random() * 38,
          w: 126,
          h: 18,
          type: Math.random() < arrowChance ? "arrow" : "spear",
          spin: Math.random() * Math.PI * 2,
          passed: false
        });
        lastDangerSpawnTime = gameTime;
      }

      function getDifficultyLevel() {
        return Math.floor(Math.max(0, gameTime - 5) / 20);
      }

      function getDangerGap() {
        return Math.max(2, 3.15 - getDifficultyLevel() * 0.38);
      }

      function scheduleNextDanger() {
        const gap = getDangerGap();
        obstacleTimer = gap;
        hazardTimer = gap;
      }

      function updateDifficulty() {
        worldSpeed = Math.min(1120, 560 + getDifficultyLevel() * 130);
      }

      function chooseNextDangerType() {
        const hazardChance = clamp(0.42 + getDifficultyLevel() * 0.12, 0.42, 0.82);
        return Math.random() < hazardChance ? "hazard" : "ground";
      }

      function getComboMultiplier() {
        return Math.min(4, 1 + Math.floor(gameTime / 15) * 0.25);
      }

      function getScoreMultiplier() {
        return getComboMultiplier() * (bonusTimer > 0 ? 2 : 1);
      }

      function trySpawnDanger() {
        if (gameTime < 5) return;
        if (!statue.grounded) return;
        if (gameTime - lastDangerSpawnTime < 2) return;
        if (obstacleTimer > 0 || hazardTimer > 0) return;

        if (nextDangerType === "ground") {
          spawnObstacle();
          nextDangerType = chooseNextDangerType();
          scheduleNextDanger();
        } else if (nextDangerType === "hazard") {
          spawnHazard();
          nextDangerType = chooseNextDangerType();
          scheduleNextDanger();
        }
      }

      function spawnSeven() {
        const heights = [groundY - 98, groundY - 178, groundY - 265];
        sevens.push({
          x: W + 30,
          y: heights[Math.floor(Math.random() * heights.length)],
          size: 52 + Math.random() * 12,
          bob: Math.random() * Math.PI * 2,
          collected: false
        });
        sevenTimer = 5 + Math.random() * 5;
      }

      function spawnCoins() {
        const count = 3 + Math.floor(Math.random() * 4);
        const startX = W + 110 + Math.random() * 120;
        for (let i = 0; i < count; i++) {
          coins.push({
            x: startX + i * (38 + Math.random() * 16),
            y: groundY - 38 - Math.random() * 18,
            r: 12,
            spin: Math.random() * Math.PI * 2,
            collected: false
          });
        }
        coinTimer = 3.2 + Math.random() * 2.2;
      }

      function ensureAudio() {
        if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) {
            audioCtx = new AudioContext();
            musicGain = audioCtx.createGain();
            musicGain.gain.value = 0;
            musicGain.connect(audioCtx.destination);
          }
        }
        if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
      }

      function startMusic() {
        musicPlaying = true;
        bgMusic.currentTime = 0;
        bgMusic.muted = musicMuted;
        bgMusic.playbackRate = 1;
        bgMusic.play().catch(() => {});
      }

      function stopMusic() {
        musicPlaying = false;
        bgMusic.pause();
        bgMusic.currentTime = 0;
      }

      function setMusicMuted(muted) {
        musicMuted = muted;
        muteButton.textContent = musicMuted ? "🔇" : "🔊";
        muteButton.setAttribute("aria-label", musicMuted ? "Turn music on" : "Turn music off");
        bgMusic.muted = musicMuted;
        if (musicGain && audioCtx) {
          musicGain.gain.cancelScheduledValues(audioCtx.currentTime);
          musicGain.gain.setTargetAtTime(musicMuted || !musicPlaying ? 0 : 0.05, audioCtx.currentTime, 0.08);
          if (!musicMuted && musicPlaying) musicNextTime = audioCtx.currentTime + 0.08;
        }
      }

      function playTone(frequency, duration, type, volume, delay = 0, endFrequency = frequency) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime + delay;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, now);
        osc.frequency.exponentialRampToValueAtTime(Math.max(20, endFrequency), now + duration);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(volume, now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration + 0.03);
      }

      function playMusicTone(frequency, duration, type, volume, time) {
        if (!audioCtx || !musicGain) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, time);
        gain.gain.setValueAtTime(0.0001, time);
        gain.gain.exponentialRampToValueAtTime(volume, time + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
        osc.connect(gain);
        gain.connect(musicGain);
        osc.start(time);
        osc.stop(time + duration + 0.03);
      }

      function playMusicDrum(time, beat) {
        if (!audioCtx || !musicGain) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(92, time);
        osc.frequency.exponentialRampToValueAtTime(38, time + beat * 0.34);
        gain.gain.setValueAtTime(0.0001, time);
        gain.gain.exponentialRampToValueAtTime(0.13, time + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + beat * 0.48);
        osc.connect(gain);
        gain.connect(musicGain);
        osc.start(time);
        osc.stop(time + beat * 0.5);
      }

      function scheduleMusic() {
        if (musicPlaying) {
          const speedRatio = clamp((worldSpeed - 560) / 560, 0, 1);
          bgMusic.playbackRate = 1 + speedRatio * 0.12;
        }
        return;
        if (!audioCtx || !musicGain || musicMuted || !musicPlaying) return;
        const speedRatio = clamp((worldSpeed - 560) / 560, 0, 1);
        const beat = 0.38 - speedRatio * 0.11;
        const melody = [220, 261.63, 293.66, 329.63, 392, 329.63, 293.66, 261.63];
        const bass = [55, 55, 73.42, 73.42, 82.41, 82.41, 73.42, 55];
        while (musicNextTime < audioCtx.currentTime + 0.8) {
          const index = musicStep % melody.length;
          playMusicDrum(musicNextTime, beat);
          playMusicTone(bass[index], beat * 1.9, "sawtooth", 0.03, musicNextTime);
          playMusicTone(bass[index] * 0.5, beat * 2.6, "sine", 0.026, musicNextTime);
          playMusicTone(melody[index], beat * 0.88, "triangle", 0.03, musicNextTime + beat * 0.16);
          if (index === 2 || index === 6) playMusicTone(melody[index] * 2, beat * 0.72, "sine", 0.015, musicNextTime + beat * 0.42);
          musicStep += 1;
          musicNextTime += beat;
        }
      }

      function playJumpSound() {
        ensureAudio();
        playTone(260, 0.18, "sine", 0.09, 0, 720);
      }

      function playCrashSound() {
        ensureAudio();
        playTone(92, 0.28, "sawtooth", 0.16, 0, 34);
        playTone(54, 0.34, "square", 0.11, 0.02, 28);
      }

      function playSevenSound() {
        ensureAudio();
        playTone(660, 0.13, "sine", 0.1);
        playTone(990, 0.16, "sine", 0.08, 0.08);
        playTone(1320, 0.18, "triangle", 0.07, 0.16);
      }

      function playPowerSound() {
        ensureAudio();
        playTone(196, 0.45, "triangle", 0.12, 0, 392);
        playTone(392, 0.42, "sine", 0.1, 0.12, 784);
        playTone(784, 0.6, "triangle", 0.09, 0.28, 1175);
      }

      function playGameOverSound() {
        ensureAudio();
        playTone(240, 0.42, "triangle", 0.12, 0, 90);
        playTone(130, 0.58, "sine", 0.1, 0.14, 48);
      }

      function update(dt) {
        const multiplier = getScoreMultiplier();
        const powerMode = bonusTimer > 0;
        gameTime += dt;
        updateDifficulty();
        scheduleMusic();
        distance += worldSpeed * dt;
        score += dt * 18 * multiplier;
        statue.stride += dt * (statue.grounded ? 9 : 4);
        if (statue.sliding) {
          statue.slideTimer -= dt;
          if (statue.slideTimer <= 0) statue.sliding = false;
        }

        statue.vy += gravity * dt;
        statue.y += statue.vy * dt;
        if (statue.y >= groundY) {
          statue.y = groundY;
          statue.vy = 0;
          statue.grounded = true;
          statue.jumps = 0;
        }

        obstacleTimer -= dt;
        hazardTimer -= dt;
        coinTimer -= dt;
        sevenTimer -= dt;
        trySpawnDanger();
        if (coinTimer <= 0 && gameTime > 5 && obstacleTimer > 0.8 && hazardTimer > 0.8) spawnCoins();
        if (sevenTimer <= 0) spawnSeven();

        obstacles.forEach((ob) => {
          ob.x -= worldSpeed * dt;
          if (!ob.passed && ob.x + ob.w < statue.x) {
            ob.passed = true;
            score += 12 * multiplier;
          }
        });
        hazards.forEach((hazard) => {
          hazard.x -= (worldSpeed + 110) * dt;
          hazard.spin += dt * 8;
          if (!hazard.passed && hazard.x + hazard.w < statue.x) {
            hazard.passed = true;
            score += 18 * multiplier;
          }
        });
        sevens.forEach((seven) => {
          seven.x -= worldSpeed * dt;
          seven.bob += dt * 4;
        });
        coins.forEach((coin) => {
          coin.x -= worldSpeed * dt;
          coin.spin += dt * 9;
        });
        dust.forEach((p) => {
          p.x += p.vx * dt;
          p.life -= dt;
          p.r *= 0.985;
        });

        obstacles = obstacles.filter((ob) => ob.x + ob.w > -80);
        hazards = hazards.filter((hazard) => hazard.x + hazard.w > -120);
        coins = coins.filter((coin) => coin.x + coin.r > -80 && !coin.collected);
        sevens = sevens.filter((seven) => seven.x + seven.size > -80 && !seven.collected);
        dust = dust.filter((p) => p.life > 0);

        if (bonusTimer > 0) {
          bonusTimer = Math.max(0, bonusTimer - dt);
          if (bonusTimer === 0) {
            sevenCooldownTimer = 5;
            streak = 0;
          }
        } else if (sevenCooldownTimer > 0) {
          sevenCooldownTimer = Math.max(0, sevenCooldownTimer - dt);
        }
        if (goldFlash > 0) goldFlash -= dt;
        if (shakeTimer > 0) shakeTimer -= dt;

        const statueBox = getStatueBox();

        for (const coin of coins) {
          if (circleRectOverlap(coin.x, coin.y, coin.r + 4, statueBox)) {
            coin.collected = true;
            score += 20 * multiplier;
          }
        }

        for (const ob of obstacles) {
          const inset = ob.type === "column" ? 14 : 8;
          if (rectsOverlap(statueBox, {
            x: ob.x + inset,
            y: ob.y + 8,
            w: ob.w - inset * 2,
            h: ob.h - 8
          })) {
            if (powerMode) {
              smashObstacle(ob);
              score += 35;
            } else {
              endGame();
              return;
            }
          }
        }

        for (const hazard of hazards) {
          if (rectsOverlap(statueBox, {
            x: hazard.x + 12,
            y: hazard.y - hazard.h / 2,
            w: hazard.w - 18,
            h: hazard.h
          })) {
            if (powerMode) {
              smashObstacle(hazard);
              score += 35;
            } else {
              endGame();
              return;
            }
          }
        }

        if (bonusTimer <= 0 && sevenCooldownTimer <= 0) {
          for (const seven of sevens) {
            const cx = seven.x + seven.size * 0.5;
            const cy = seven.y + Math.sin(seven.bob) * 10;
            if (circleRectOverlap(cx, cy, seven.size * 0.42, statueBox)) {
              seven.collected = true;
              streak += 1;
              score += 77 * multiplier;
              goldFlash = 0.16;
              playSevenSound();
              if (streak >= 3) {
                streak = 0;
                bonusTimer = 5;
                goldFlash = 1;
                shakeTimer = 0.55;
                shakePower = 9;
                playPowerSound();
              }
            }
          }
        }
      }

      function getStatueBox() {
        if (bonusTimer > 0) {
          return {
            x: statue.x - statue.w * 0.7,
            y: groundY - statue.h * 3,
            w: statue.w * 2.45,
            h: statue.h * 3
          };
        }
        if (statue.sliding && statue.grounded) {
          return {
            x: statue.x + 8,
            y: groundY - 74,
            w: statue.w + 22,
            h: 64
          };
        }
        return {
          x: statue.x + 14,
          y: statue.y - statue.h + 12,
          w: statue.w - 24,
          h: statue.h - 18
        };
      }

      function smashObstacle(item) {
        item.x = -999;
        shakeTimer = 0.22;
        shakePower = 12;
        goldFlash = Math.max(goldFlash, 0.12);
        for (let i = 0; i < 18; i++) {
          dust.push({
            x: statue.x + 110 + Math.random() * 82,
            y: groundY - 85 + Math.random() * 92,
            r: 3 + Math.random() * 7,
            life: 0.42 + Math.random() * 0.3,
            vx: -260 + Math.random() * 190
          });
        }
      }

      function rectsOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function circleRectOverlap(cx, cy, radius, rect) {
        const nx = clamp(cx, rect.x, rect.x + rect.w);
        const ny = clamp(cy, rect.y, rect.y + rect.h);
        return (cx - nx) ** 2 + (cy - ny) ** 2 < radius ** 2;
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        ctx.save();
        if (shakeTimer > 0) {
          const strength = shakePower * (shakeTimer / 0.55);
          ctx.translate((Math.random() - 0.5) * strength, (Math.random() - 0.5) * strength);
        }
        drawSky();
        drawWatermark();
        drawLandscape();
        drawTemples();
        drawGround();
        drawDust();
        obstacles.forEach(drawObstacle);
        hazards.forEach(drawHazard);
        coins.forEach(drawCoin);
        sevens.forEach(drawSeven);
        drawStatue();
        ctx.restore();
        drawHud();
        drawBonusFlash();
      }

      function drawSky() {
        const phase = getDayPhase();
        const sky = ctx.createLinearGradient(0, 0, 0, H);
        sky.addColorStop(0, phaseColor("#68bdf5", "#f67d37", "#081328", phase));
        sky.addColorStop(0.48, phaseColor("#bfe9ff", "#f7b35a", "#15234a", phase));
        sky.addColorStop(0.75, phaseColor("#f4d89b", "#e8803b", "#251d3a", phase));
        sky.addColorStop(1, phaseColor("#dfb05e", "#9b5734", "#161326", phase));
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, H);

        drawStars(phase.night);

        ctx.fillStyle = `rgba(255,255,255,${0.72 - phase.night * 0.42})`;
        for (let i = 0; i < 5; i++) {
          const x = ((i * 290 - distance * 0.08) % 1500) - 150;
          drawCloud(x, 82 + (i % 3) * 46, 1 + (i % 2) * 0.35);
        }
      }

      function getDayPhase() {
        const progress = clamp(distance / 9000, 0, 1);
        return {
          sunset: clamp((progress - 0.22) / 0.34, 0, 1),
          night: clamp((progress - 0.58) / 0.26, 0, 1)
        };
      }

      function phaseColor(day, sunset, night, phase) {
        return mixColor(mixColor(day, sunset, phase.sunset), night, phase.night);
      }

      function mixColor(a, b, t) {
        const pa = parseColor(a);
        const pb = parseColor(b);
        return `rgb(${Math.round(pa.r + (pb.r - pa.r) * t)}, ${Math.round(pa.g + (pb.g - pa.g) * t)}, ${Math.round(pa.b + (pb.b - pa.b) * t)})`;
      }

      function parseColor(color) {
        if (color.startsWith("rgb")) {
          const [r, g, b] = color.match(/\d+/g).map(Number);
          return { r, g, b };
        }
        const value = parseInt(color.slice(1), 16);
        return { r: value >> 16, g: (value >> 8) & 255, b: value & 255 };
      }

      function drawStars(alpha) {
        if (alpha <= 0.02) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "#fff8d4";
        for (let i = 0; i < 80; i++) {
          const x = (i * 157 + Math.sin(i * 12.7) * 80 - distance * 0.03) % (W + 80) - 40;
          const y = 26 + ((i * 83) % 275);
          const r = 1 + (i % 3) * 0.55;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawCloud(x, y, s) {
        ctx.beginPath();
        ctx.ellipse(x, y, 48 * s, 18 * s, 0, 0, Math.PI * 2);
        ctx.ellipse(x + 42 * s, y - 8 * s, 42 * s, 21 * s, 0, 0, Math.PI * 2);
        ctx.ellipse(x + 88 * s, y, 52 * s, 18 * s, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawWatermark() {
        ctx.save();
        ctx.globalAlpha = 0.09;
        ctx.fillStyle = "#b9172c";
        ctx.font = "900 176px Georgia";
        ctx.textAlign = "center";
        for (let i = 0; i < 4; i++) {
          const x = ((i * 430 - distance * 0.12) % 1700) - 230;
          ctx.fillText("777", x, 265 + (i % 2) * 110);
        }
        ctx.restore();
      }

      function drawLandscape() {
        drawHill("#f6d68e", 0.18, 440, 72);
        drawHill("#d9ad61", 0.28, 500, 96);
        drawHill("#b98048", 0.42, 560, 72);
      }

      function drawHill(color, speed, base, amp) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, H);
        for (let x = 0; x <= W + 32; x += 32) {
          const y = base + Math.sin((x + distance * speed) * 0.008) * amp * 0.32
            + Math.sin((x + distance * speed) * 0.019) * amp * 0.18;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H);
        ctx.closePath();
        ctx.fill();
      }

      function drawTemples() {
        for (let i = 0; i < 5; i++) {
          const x = ((i * 355 - distance * 0.26) % 1700) - 230;
          drawTemple(x, 338 + (i % 2) * 34, 0.72 + (i % 3) * 0.1);
        }
      }

      function drawTemple(x, y, s) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(s, s);
        ctx.fillStyle = "rgba(83, 72, 72, 0.18)";
        ctx.fillRect(16, 128, 230, 16);
        ctx.fillStyle = "#fbf5e8";
        ctx.strokeStyle = "#d8c8aa";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(12, 48);
        ctx.lineTo(132, 0);
        ctx.lineTo(254, 48);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#eee2cc";
        ctx.fillRect(28, 50, 210, 18);
        ctx.fillStyle = "#fffaf0";
        for (let c = 0; c < 6; c++) {
          const cx = 44 + c * 34;
          ctx.fillRect(cx, 68, 16, 64);
          ctx.fillStyle = "#dfd2bd";
          ctx.fillRect(cx + 5, 68, 2, 64);
          ctx.fillStyle = "#fffaf0";
        }
        ctx.fillStyle = "#e8d8bc";
        ctx.fillRect(20, 132, 226, 18);
        ctx.restore();
      }

      function drawGround() {
        const grd = ctx.createLinearGradient(0, groundY - 18, 0, H);
        grd.addColorStop(0, "#f2cc7a");
        grd.addColorStop(1, "#8a5837");
        ctx.fillStyle = grd;
        ctx.fillRect(0, groundY, W, H - groundY);

        ctx.strokeStyle = "rgba(255, 248, 236, 0.35)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, groundY + 2);
        ctx.lineTo(W, groundY + 2);
        ctx.stroke();

        for (let i = 0; i < 32; i++) {
          const x = ((i * 72 - distance * 0.9) % (W + 90)) - 40;
          ctx.fillStyle = i % 2 ? "rgba(255,255,255,0.12)" : "rgba(100,61,39,0.17)";
          ctx.fillRect(x, groundY + 32 + (i % 3) * 24, 34 + (i % 4) * 16, 4);
        }
      }

      function drawDust() {
        dust.forEach((p) => {
          ctx.fillStyle = `rgba(255, 239, 199, ${clamp(p.life * 1.7, 0, 0.7)})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawObstacle(ob) {
        ctx.save();
        ctx.translate(ob.x + ob.w / 2, ob.y + ob.h / 2);
        ctx.rotate(ob.rotation);
        ctx.translate(-ob.w / 2, -ob.h / 2);

        const marble = ctx.createLinearGradient(0, 0, ob.w, ob.h);
        marble.addColorStop(0, "#fff9ef");
        marble.addColorStop(0.55, "#d4d0cb");
        marble.addColorStop(1, "#a9a5a0");
        ctx.fillStyle = marble;
        ctx.strokeStyle = "#8d8984";
        ctx.lineWidth = 4;

        if (ob.type === "column") {
          ctx.fillRect(12, 8, ob.w - 24, ob.h - 12);
          ctx.strokeRect(12, 8, ob.w - 24, ob.h - 12);
          ctx.fillStyle = "#fefaf2";
          ctx.fillRect(4, 0, ob.w - 8, 16);
          ctx.fillRect(0, ob.h - 20, ob.w, 20);
          ctx.fillStyle = "rgba(113, 110, 112, 0.26)";
          for (let i = 0; i < 3; i++) ctx.fillRect(23 + i * 13, 20, 4, ob.h - 46);
          ctx.strokeStyle = "rgba(116, 105, 101, 0.45)";
          ctx.beginPath();
          ctx.moveTo(6, 22);
          ctx.lineTo(ob.w - 10, 36);
          ctx.moveTo(15, ob.h - 32);
          ctx.lineTo(ob.w - 16, ob.h - 44);
          ctx.stroke();
        } else {
          ctx.fillRect(0, 0, ob.w, ob.h);
          ctx.strokeRect(0, 0, ob.w, ob.h);
          ctx.fillStyle = "rgba(255,255,255,0.24)";
          ctx.fillRect(8, 8, ob.w - 18, 10);
          ctx.strokeStyle = "rgba(115, 103, 100, 0.5)";
          ctx.beginPath();
          ctx.moveTo(12, ob.h - 16);
          ctx.lineTo(ob.w - 10, 18);
          ctx.moveTo(34, 12);
          ctx.lineTo(ob.w - 16, ob.h - 12);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawHazard(hazard) {
        ctx.save();
        ctx.translate(hazard.x, hazard.y);
        ctx.shadowColor = "rgba(0,0,0,0.25)";
        ctx.shadowBlur = 5;
        ctx.lineWidth = 5;
        ctx.strokeStyle = hazard.type === "spear" ? "#f5f0e7" : "#7a5131";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(hazard.w, 0);
        ctx.stroke();
        ctx.fillStyle = "#d6d0c7";
        ctx.strokeStyle = "#8d8984";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(hazard.w + 24, 0);
        ctx.lineTo(hazard.w - 4, -13);
        ctx.lineTo(hazard.w + 4, 0);
        ctx.lineTo(hazard.w - 4, 13);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        if (hazard.type === "arrow") {
          ctx.fillStyle = "#e31937";
          ctx.beginPath();
          ctx.moveTo(2, 0);
          ctx.lineTo(-20, -11);
          ctx.lineTo(-12, 0);
          ctx.lineTo(-20, 11);
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.fillStyle = "#ffd76a";
          ctx.beginPath();
          ctx.arc(10, 0, 8, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawCoin(coin) {
        ctx.save();
        ctx.translate(coin.x, coin.y);
        ctx.scale(Math.abs(Math.cos(coin.spin)) * 0.55 + 0.45, 1);
        ctx.shadowColor = "#ffd76a";
        ctx.shadowBlur = 10;
        const shine = ctx.createRadialGradient(-4, -5, 2, 0, 0, coin.r);
        shine.addColorStop(0, "#fff5a8");
        shine.addColorStop(0.45, "#ffd76a");
        shine.addColorStop(1, "#b87916");
        ctx.fillStyle = shine;
        ctx.strokeStyle = "#fff0a0";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, coin.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = "rgba(120, 70, 12, 0.48)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, coin.r * 0.55, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawSeven(seven) {
        const y = seven.y + Math.sin(seven.bob) * 10;
        ctx.save();
        ctx.translate(seven.x + seven.size / 2, y);
        ctx.shadowColor = "#ff1f3d";
        ctx.shadowBlur = 22;
        ctx.fillStyle = "#e31937";
        ctx.strokeStyle = "#ffe18a";
        ctx.lineWidth = 3;
        ctx.font = `900 ${seven.size}px Georgia`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.strokeText("7", 0, 0);
        ctx.fillText("7", 0, 0);
        ctx.restore();
      }

      function drawStatue() {
        const x = statue.x;
        const powerMode = bonusTimer > 0;
        const scale = powerMode ? 3 : 1;
        const top = statue.y - statue.h * scale;
        const stride = Math.sin(statue.stride);
        const arm = Math.sin(statue.stride + Math.PI);
        const slideLean = statue.sliding && statue.grounded ? 0.78 : 1;
        const slideOffset = statue.sliding && statue.grounded ? 72 : 0;

        ctx.save();
        ctx.translate(x - (scale - 1) * 43, top + slideOffset);
        ctx.scale(scale, scale * slideLean);
        if (powerMode) {
          ctx.shadowColor = "#ffd76a";
          ctx.shadowBlur = 34;
        }
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        if (!powerMode) ctx.shadowColor = "rgba(0,0,0,0.2)";
        if (!powerMode) ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 5;

        const skin = ctx.createLinearGradient(0, 0, statue.w, statue.h);
        skin.addColorStop(0, "#ffffff");
        skin.addColorStop(0.48, "#e3dfd8");
        skin.addColorStop(1, "#afa9a1");

        ctx.strokeStyle = skin;
        ctx.fillStyle = skin;

        const legLift = statue.sliding ? 26 : 0;
        drawLimb(40, 108, 16 + stride * 18, 149 + legLift, 12 + stride * 32, 176, 17);
        drawLimb(56, 108, 75 - stride * 18, 149 + legLift, 84 - stride * 31, 176, 17);
        drawLimb(29, 59, 10 + arm * 13, 89, 25 + arm * 21, 113, 14);
        drawLimb(67, 59, 88 - arm * 13, 88, 78 - arm * 22, 113, 14);

        ctx.beginPath();
        ctx.ellipse(48, 76, 33, 51, -0.04, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(132, 125, 118, 0.38)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(48, 55, 43, 18, 0.02, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#f8f4ec";
        ctx.beginPath();
        ctx.ellipse(47, 22, 19, 24, 0.08, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "rgba(114, 107, 102, 0.52)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(39, 18);
        ctx.lineTo(44, 17);
        ctx.moveTo(52, 17);
        ctx.lineTo(57, 18);
        ctx.moveTo(48, 22);
        ctx.lineTo(46, 30);
        ctx.moveTo(43, 36);
        ctx.lineTo(55, 35);
        ctx.stroke();

        ctx.fillStyle = "rgba(230, 226, 218, 0.58)";
        ctx.beginPath();
        ctx.arc(34, 18, 8, Math.PI * 0.8, Math.PI * 1.85);
        ctx.arc(61, 18, 8, Math.PI * 1.15, Math.PI * 2.2);
        ctx.fill();

        ctx.fillStyle = "rgba(185, 181, 176, 0.45)";
        ctx.beginPath();
        ctx.moveTo(22, 48);
        ctx.quadraticCurveTo(48, 76, 74, 48);
        ctx.quadraticCurveTo(66, 116, 34, 124);
        ctx.quadraticCurveTo(43, 84, 22, 48);
        ctx.fill();

        ctx.strokeStyle = "rgba(108, 101, 95, 0.24)";
        ctx.lineWidth = 2;
        for (let i = 0; i < 7; i++) {
          ctx.beginPath();
          ctx.moveTo(20 + i * 9, 51);
          ctx.quadraticCurveTo(34 + i * 5, 88, 28 + i * 8, 124);
          ctx.stroke();
        }
        ctx.strokeStyle = "rgba(109, 103, 96, 0.34)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(35, 79);
        ctx.quadraticCurveTo(48, 86, 61, 79);
        ctx.moveTo(36, 94);
        ctx.lineTo(60, 94);
        ctx.moveTo(39, 108);
        ctx.lineTo(57, 108);
        ctx.stroke();

        if (powerMode) {
          ctx.globalCompositeOperation = "lighter";
          ctx.strokeStyle = "rgba(255, 215, 106, 0.75)";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.ellipse(48, 92, 58, 104, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawLimb(x1, y1, x2, y2, x3, y3, width) {
        ctx.strokeStyle = "#eeeae2";
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(x2, y2, x3, y3);
        ctx.stroke();
        ctx.strokeStyle = "rgba(119, 113, 108, 0.26)";
        ctx.lineWidth = Math.max(2, width * 0.18);
        ctx.stroke();
      }

      function drawHud() {
        ctx.save();
        ctx.fillStyle = "#ffd76a";
        ctx.strokeStyle = "rgba(65, 37, 13, 0.6)";
        ctx.lineWidth = 5;
        ctx.font = "900 42px Georgia";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        const text = `Score ${Math.floor(score).toLocaleString()}`;
        ctx.strokeText(text, 30, 24);
        ctx.fillText(text, 30, 24);

        ctx.font = "800 28px Georgia";
        ctx.textAlign = "right";
        const bonusText = bonusTimer > 0 ? `777 POWER MODE ${Math.ceil(bonusTimer)}s` : `7 Streak ${streak}/3`;
        ctx.strokeText(bonusText, W - 30, 34);
        ctx.fillStyle = bonusTimer > 0 ? "#fff2ad" : "#e31937";
        ctx.fillText(bonusText, W - 30, 34);

        const comboText = `Combo x${getComboMultiplier().toFixed(2)}`;
        ctx.font = "800 26px Georgia";
        ctx.fillStyle = "#ffd76a";
        ctx.strokeText(comboText, W - 30, 72);
        ctx.fillText(comboText, W - 30, 72);
        ctx.restore();
      }

      function drawBonusFlash() {
        if (goldFlash <= 0) return;
        ctx.save();
        ctx.globalAlpha = clamp(goldFlash, 0, 0.55);
        ctx.fillStyle = "#ffd76a";
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = clamp(goldFlash * 0.9, 0, 0.8);
        ctx.strokeStyle = "#fff6ba";
        ctx.lineWidth = 16;
        ctx.strokeRect(12, 12, W - 24, H - 24);
        ctx.restore();
      }

      function loop(time) {
        if (state !== "playing") {
          draw();
          return;
        }
        const dt = Math.min(0.033, (time - lastTime) / 1000 || 0);
        lastTime = time;
        update(dt);
        draw();
        if (state === "playing") requestAnimationFrame(loop);
      }

      startButton.addEventListener("click", startGame);
      restartButton.addEventListener("click", startGame);
      muteButton.addEventListener("click", () => {
        ensureAudio();
        setMusicMuted(!musicMuted);
      });
      window.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
          event.preventDefault();
          jump();
        }
        if (event.code === "ArrowDown") {
          event.preventDefault();
          slide();
        }
      });
      let touchStartY = 0;
      let touchStartX = 0;
      window.addEventListener("pointerdown", (event) => {
        touchStartY = event.clientY;
        touchStartX = event.clientX;
        if (event.target.tagName !== "BUTTON" && event.pointerType === "mouse") jump();
      });
      window.addEventListener("pointerup", (event) => {
        const dy = event.clientY - touchStartY;
        const dx = Math.abs(event.clientX - touchStartX);
        if (event.target.tagName === "BUTTON" || event.pointerType === "mouse") return;
        if (dy > 45 && dy > dx * 1.15) {
          slide();
        } else {
          jump();
        }
      });

      draw();
    })();
  </script>
</body>
</html>
